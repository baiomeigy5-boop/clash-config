# Generated for Clash Verge - 內嵌節點最終版
mode: rule
mixed-port: 7897
socks-port: 7898
port: 7899
allow-lan: true
log-level: info
external-controller: 127.0.0.1:9097

tun:
  enable: true
  stack: system
  device: Meta
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  mtu: 1500

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fake-ip-filter:
    - dns.msftncsi.com
    - www.msftncsi.com
    - www.msftconnecttest.com

# --- 請在這裡貼上你從瀏覽器複製的節點內容 ---
# 格式範例：
# proxies:
#   - name: "新加坡Z01⚡️IEPL"
#     type: ss
#     server: ...
# ---------------------------------------
proxies:
  # (這裡請貼上瀏覽器下載下來的所有節點)

proxy-groups:
  - name: 🇸🇬 新加坡
    type: select
    # 這裡改用手動列出名稱，或直接引用所有節點
    # 如果節點太多，可以保持原本的 select 並手動在介面選
    proxies:
      - DIRECT
      # 下面會自動出現你貼上的節點名稱

  - name: 🚀 Proxy
    type: select
    proxies:
      - 🇸🇬 新加坡
      - DIRECT

rules:
  - GEOIP,LAN,DIRECT
  - MATCH,🚀 Proxy
