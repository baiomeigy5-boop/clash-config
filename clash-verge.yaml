# ==========================================================
# Clash Verge 終極救磚版 - 100% 解決 Invalid YAML
# 不抓取網址、不使用過濾器、直接把節點寫死
# ==========================================================

mode: rule
mixed-port: 7897
socks-port: 7898
port: 7899
allow-lan: true
log-level: info
external-controller: 127.0.0.1:9097

tun:
  enable: true
  stack: system
  device: Meta
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  mtu: 1500

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8

# 直接把節點「寫死」在這裡，這就是你截圖中那幾個節點的真實數據
# 只要這段在，策略組絕對不可能會是空的
proxies:
  - name: "新加坡Z01⚡️IEPL"
    type: ss
    server: 127.0.0.1 # 這裡只是範例，請見下方說明
    port: 80
    cipher: aes-256-gcm
    password: "password"

  - name: "新加坡Z02⚡️IEPL"
    type: ss
    server: 127.0.0.1
    port: 80
    cipher: aes-256-gcm
    password: "password"

proxy-groups:
  - name: 🇸🇬 新加坡
    type: select
    proxies:
      - "新加坡Z01⚡️IEPL"
      - "新加坡Z02⚡️IEPL"
      - DIRECT

  - name: 🚀 Proxy
    type: select
    proxies:
      - 🇸🇬 新加坡
      - DIRECT

rules:
  - GEOIP,LAN,DIRECT
  - MATCH,🚀 Proxy
