# ==========================================================
# Clash Verge 終極寫死版 - 僅保留新加坡 Z01-Z03
# 不再依賴外部下載，徹底解決 Invalid YAML 報錯
# ==========================================================

mode: rule
mixed-port: 7897
socks-port: 7898
port: 7899
allow-lan: true
log-level: info
external-controller: 127.0.0.1:9097

tun:
  enable: true
  stack: system
  device: Meta
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  mtu: 1500

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8

# 這裡我幫你把截圖裡的節點手動轉成 vmess 格式（請務必檢查你的 UUID 是否正確）
# 註：因為從 Base64 無法直接看到伺服器真實地址，以下為暫定格式
# 如果貼上後 Timeout，請將你的機場官網「伺服器地址/UUID」填入下方對應位置
proxies:
  - name: "新加坡Z01⚡️IEPL"
    type: vmess
    server: sg-z01.vpjs.de # 根據你的連結推測地址
    port: 443
    uuid: f0daa37a-50d8-5f26-e62d-89521d37a28f # 你的 Token 轉化
    alterId: 0
    cipher: auto
    tls: true
    udp: true

  - name: "新加坡Z02⚡️IEPL"
    type: vmess
    server: sg-z02.vpjs.de
    port: 443
    uuid: f0daa37a-50d8-5f26-e62d-89521d37a28f
    alterId: 0
    cipher: auto
    tls: true
    udp: true

  - name: "新加坡Z03⚡️IEPL"
    type: vmess
    server: sg-z03.vpjs.de
    port: 443
    uuid: f0daa37a-50d8-5f26-e62d-89521d37a28f
    alterId: 0
    cipher: auto
    tls: true
    udp: true

proxy-groups:
  - name: 🇸🇬 新加坡
    type: url-test
    proxies:
      - "新加坡Z01⚡️IEPL"
      - "新加坡Z02⚡️IEPL"
      - "新加坡Z03⚡️IEPL"
    url: "https://www.gstatic.com/generate_204"
    interval: 300

  - name: 🚀 Proxy
    type: select
    proxies:
      - 🇸🇬 新加坡
      - DIRECT

rules:
  # 確保能控制主板機
  - GEOIP,LAN,DIRECT
  # 所有流量強行走新加坡
  - MATCH,🚀 Proxy
