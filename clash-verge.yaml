# Generated for Clash Verge - 強制全域版 (Global Mode)
mode: global  # 直接切換到全域模式，不走任何分流規則
mixed-port: 7897
socks-port: 7898
port: 7899
allow-lan: true
log-level: info
external-controller: 127.0.0.1:9097

tun:
  enable: true
  stack: system
  device: Meta
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  mtu: 1500

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fake-ip-filter:
    - dns.msftncsi.com
    - www.msftncsi.com
    - www.msftconnecttest.com

proxy-providers:
  shanhuyun:
    type: http
    url: "https://ccyz.vpjs.de/link-c?token=f0daa37a50d85f26e62d89521d37a28f"
    interval: 3600
    path: ./providers/shanhuyun.yaml
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300

proxy-groups:
  - name: 🇸🇬 新加坡
    type: url-test
    use: [shanhuyun]
    filter: "新加坡"
    url: "https://www.gstatic.com/generate_204"
    interval: 30
    tolerance: 50

# 全域模式下，Clash 會直接使用 GLOBAL 組，請在介面手動勾選「🇸🇬 新加坡」
