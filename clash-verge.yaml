# Generated for Clash Verge - 手動更新版
mode: rule
mixed-port: 7897
socks-port: 7898
port: 7899
allow-lan: true
log-level: info
external-controller: 127.0.0.1:9097

tun:
  enable: true
  stack: system
  device: Meta
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  mtu: 1500

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fake-ip-filter:
    - dns.msftncsi.com
    - www.msftncsi.com
    - www.msftconnecttest.com

proxy-providers:
  shanhuyun:
    type: http
    url: "https://resourcemap.lol/sub?token=6Tj1VpVf4BwgBLTXPpC7oeCr_Ph61Muhr2v2Qr9sXwo&type=clash&protocol=ss2022&use=foreign&rule=default"
    # 已設定為 0，禁用定時自動更新
    interval: 0
    path: ./providers/shanhuyun.yaml
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300

proxy-groups:
# 🇸🇬 新加坡 - 篩選 Singapore 01 到 05
- name: 🇸🇬 新加坡
  type: fallback
  use: [shanhuyun]
  filter: "Singapore 0[1-5]"
  url: "https://www.gstatic.com/generate_204"
  interval: 15

# 🇯🇵 日本 - 篩選 Japan 01 到 05
- name: 🇯🇵 日本
  type: fallback
  use: [shanhuyun]
  filter: "Japan 0[1-5]"
  url: "https://www.gstatic.com/generate_204"
  interval: 15

# 🚀 出口選擇
- name: 🚀 Proxy
  type: select
  proxies:
  - 🇸🇬 新加坡
  - 🇯🇵 日本
  - DIRECT

rules:
- MATCH,🚀 Proxy
