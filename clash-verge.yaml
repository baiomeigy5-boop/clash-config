# Generated for Clash Verge - 新加坡專用 (已整合轉化邏輯)
mode: rule
mixed-port: 7897
socks-port: 7898
port: 7899
allow-lan: true
log-level: info
external-controller: 127.0.0.1:9097

tun:
  enable: true
  stack: system
  device: Meta
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  mtu: 1500

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fake-ip-filter:
    - dns.msftncsi.com
    - www.msftncsi.com
    - www.msftconnecttest.com

proxy-providers:
  shanhuyun:
    type: http
    # 重點：我幫你把通用連結加上了轉換參數，這樣 Clash 就能讀懂了
    url: "https://sub.v1.mk/sub?target=clash&url=https%3A%2F%2Fccyz.vpjs.de%2Flink-c%3Ftoken%3Df0daa37a50d85f26e62d89521d37a28f&insert=false&emoji=true&list=false&tfo=false&scv=false&fdn=false&sort=false&new_name=true"
    interval: 3600
    path: ./providers/shanhuyun.yaml
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300

proxy-groups:
  # 🇸🇬 新加坡 - 根據你截圖的名稱進行篩選
  - name: 🇸🇬 新加坡
    type: url-test
    use: [shanhuyun]
    # 同時匹配簡體與繁體新加坡，並鎖定 Z01~Z03
    filter: "(新加坡|新加坡).*Z0"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: 🚀 Proxy
    type: select
    proxies:
      - 🇸🇬 新加坡
      - DIRECT

rules:
  # 區域網路直連
  - GEOIP,LAN,DIRECT
  # 所有流量強制走新加坡
  - MATCH,🚀 Proxy
