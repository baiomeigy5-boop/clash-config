# Generated for Clash Verge - 手動更新版 N1 (Singapore Only)
mode: rule
mixed-port: 7897
socks-port: 7898
port: 7899
allow-lan: true
log-level: info
external-controller: 127.0.0.1:9097

tun:
  enable: true
  stack: system
  device: Meta
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  mtu: 1500

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fake-ip-filter:
    - dns.msftncsi.com
    - www.msftncsi.com
    - www.msftconnecttest.com

proxy-providers:
  shanhuyun:
    type: http
    # 已更新為你的新訂閱連結
    url: "https://ccyz.vpjs.de/link-c?token=f0daa37a50d85f26e62d89521d37a28f"
    interval: 3600
    path: ./providers/shanhuyun.yaml
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300

proxy-groups:
  # 🇸🇬 新加坡 - 自動選擇 Z01 ~ Z03 中延遲最低的節點
  - name: 🇸🇬 新加坡
    type: url-test
    use: [shanhuyun]
    # 篩選名稱包含 新加坡Z01, 新加坡Z02, 新加坡Z03 的節點
    filter: "新加坡Z0[1-3]"
    url: "https://www.gstatic.com/generate_204"
    interval: 30
    tolerance: 50

  # 🚀 出口選擇 - 僅保留新加坡與直連
  - name: 🚀 Proxy
    type: select
    proxies:
      - 🇸🇬 新加坡
      - DIRECT

rules:
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🚀 Proxy
