# Generated for Clash Verge - 新加坡多重編碼兼容版
mode: rule
mixed-port: 7897
socks-port: 7898
port: 7899
allow-lan: true
log-level: info
external-controller: 127.0.0.1:9097

tun:
  enable: true
  stack: system
  device: Meta
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  mtu: 1500

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fake-ip-filter:
    - dns.msftncsi.com
    - www.msftncsi.com
    - www.msftconnecttest.com

proxy-providers:
  shanhuyun:
    type: http
    url: "https://ccyz.vpjs.de/link-c?token=f0daa37a50d85f26e62d89521d37a28f"
    interval: 3600
    path: ./providers/shanhuyun.yaml
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300

proxy-groups:
  # 🇸🇬 新加坡 - 同時支援繁體「新加坡」、簡體「新加坡」與英文「Singapore」
  - name: 🇸🇬 新加坡
    type: url-test
    use: [shanhuyun]
    # 使用 | (或) 符號來匹配不同的字元編碼
    filter: "新加坡|新加坡|Singapore|SG"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: 🚀 Proxy
    type: select
    proxies:
      - 🇸🇬 新加坡
      - DIRECT

rules:
  - GEOIP,LAN,DIRECT
  - MATCH,🚀 Proxy
