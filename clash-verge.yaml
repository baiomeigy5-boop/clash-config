# ==========================================================
# Clash Verge 完整優化設定檔 - 最終版
# ==========================================================

mode: rule
mixed-port: 7897
socks-port: 7898
port: 7899
allow-lan: true
log-level: info
external-controller: 127.0.0.1:9097

# TUN 模式
tun:
  enable: true
  stack: system
  device: Meta
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  mtu: 1500

# DNS 設定
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fake-ip-filter:
    - dns.msftncsi.com
    - www.msftncsi.com
    - www.msftconnecttest.com

# 訂閱來源
proxy-providers:
  mysub:
    type: http
    url: "https://ccyz.vpjs.de/link-c?token=f0daa37a50d85f26e62d89521d37a28f"
    interval: 3600
    path: ./providers/mysub.yaml
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300

# 策略組
proxy-groups:
  - name: 🇸🇬 新加坡
    type: url-test
    use: [mysub]
    filter: "Singapore|新加坡|SG"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: 🇯🇵 日本
    type: url-test
    use: [mysub]
    filter: "Japan|日本|JP"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: 🚀 Proxy
    type: select
    proxies:
      - 🇸🇬 新加坡
      - 🇯🇵 日本
      - DIRECT

# 分流規則
rules:
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🚀 Proxy
